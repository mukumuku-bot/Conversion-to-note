<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to 模範ノート生成器 v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            chtml: {
                matchFontHeight: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        .notebook-theme h1 { font-size: 1.75rem; font-weight: bold; color: #1d4ed8; border-bottom: 2px solid #bfdbfe; padding-bottom: 0.5rem; margin-top: 1.5rem; margin-bottom: 1rem; }
        .notebook-theme h2 { font-size: 1.35rem; font-weight: bold; color: #1f2937; border-left: 5px solid #3b82f6; padding-left: 0.75rem; margin-top: 1.75rem; margin-bottom: 0.75rem; }
        .notebook-theme h3 { font-size: 1.15rem; font-weight: bold; color: #374151; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .notebook-theme p { font-size: 1rem; color: #4b5563; line-height: 1.75; margin-bottom: 1rem; }
        .notebook-theme ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .notebook-theme ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .notebook-theme li { margin-bottom: 0.35rem; line-height: 1.6; }
        .notebook-theme code { background-color: #f3f4f6; color: #ef4444; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9rem; }
        .notebook-theme pre { background-color: #f9fafb; border: 1px solid #e5e7eb; padding: 1rem; border-radius: 0.375rem; overflow-x: auto; margin-bottom: 1rem; }
        .notebook-theme table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.9rem; }
        .notebook-theme th { background-color: #f3f4f6; border: 1px solid #d1d5db; padding: 0.6rem 1rem; font-weight: bold; text-align: left; }
        .notebook-theme td { border: 1px solid #d1d5db; padding: 0.6rem 1rem; color: #4b5563; }
        .notebook-theme blockquote { border-left: 4px solid #d1d5db; padding-left: 1rem; color: #6b7280; font-style: italic; margin-bottom: 1rem; }
        /* MathJaxの数式ブロックの間隔調整 */
        .notebook-theme .MathJax_Display { margin: 1rem 0 !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-200">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">📝 PDF 模範ノート生成器</h1>
        <p class="text-center text-xs text-gray-400 mb-6">Version 3.0 (高解像度ノート・数式＆マークダウン完全対応版)</p>
        
        <div class="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
            <label class="block text-sm font-semibold mb-2" for="apiKey">Gemini API Key:</label>
            <input type="password" id="apiKey" class="w-full p-2 border border-gray-300 rounded mb-2 bg-white" placeholder="AI Studioで取得したAPIキーを入力">
            <p class="text-xs text-gray-500">※キーはブラウザにのみ保存され、外部サーバーには送信されません。</p>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold mb-2">PDFファイルをアップロード (写真スキャンも対応):</label>
            <input type="file" id="pdfFile" accept="application/pdf" class="w-full p-2 border border-dashed border-blue-400 rounded bg-blue-50 text-center cursor-pointer">
        </div>

        <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition-all disabled:bg-gray-400 shadow-sm" disabled>
            ノートを生成する
        </button>

        <div id="status" class="mt-4 text-center text-sm font-medium text-gray-600"></div>

        <hr class="my-8 border-gray-200">

        <div>
            <h2 class="text-xl font-bold mb-4 flex justify-between items-center text-gray-800">
                ✨ 生成された模範ノート
                <button id="copyBtn" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded hidden font-normal transition-all">プレーンテキストをコピー</button>
            </h2>
            <div id="output" class="p-8 bg-amber-50/20 border border-gray-200 rounded-lg overflow-auto max-h-[70vh] shadow-inner notebook-theme min-h-[200px]">
                <p class="text-gray-400 italic">ここに生成されたノートが美しいレイアウトで表示されます...</p>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const apiKeyInput = document.getElementById('apiKey');
        const pdfFileInput = document.getElementById('pdfFile');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        let rawMarkdownOutput = ""; // コピー用に生マークダウンを保持

        if (localStorage.getItem('gemini_api_key')) {
            apiKeyInput.value = localStorage.getItem('gemini_api_key');
        }

        const checkInputs = () => {
            generateBtn.disabled = !(apiKeyInput.value && pdfFileInput.files.length > 0);
        };
        apiKeyInput.addEventListener('input', checkInputs);
        pdfFileInput.addEventListener('change', checkInputs);

        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            const file = pdfFileInput.files[0];

            if (!apiKey || !file) return;

            localStorage.setItem('gemini_api_key', apiKey);

            try {
                generateBtn.disabled = true;
                statusDiv.innerText = "⏳ PDFの読み込みを開始...";
                outputDiv.innerHTML = `<p class="text-gray-400 italic">生成中...</p>`;
                copyBtn.classList.add('hidden');

                const base64Images = await extractImagesFromPDF(file);
                
                if (base64Images.length === 0) {
                    throw new Error("PDFからページ画像を生成できませんでした。");
                }

                statusDiv.innerText = `🤖 Gemini APIで超精細ノートを生成中（全 ${base64Images.length} ページ）...`;

                // Geminiからマークダウン（数式入り）を取得
                rawMarkdownOutput = await generateNotebook(apiKey, base64Images);

                statusDiv.innerText = "🎨 数式とレイアウトを綺麗に整形中...";

                // 1. marked.js でマークダウンをHTMLに変換して流し込む
                outputDiv.innerHTML = marked.parse(rawMarkdownOutput);

                // 2. MathJax で数式コード（$ や $$）を美しい数式フォントにレンダリング
                if (window.MathJax && window.MathJax.typesetPromise) {
                    await window.MathJax.typesetPromise([outputDiv]);
                }

                statusDiv.innerText = "✅ 最高の模範ノートが完成しました！";
                copyBtn.classList.remove('hidden');

            } catch (error) {
                statusDiv.innerText = "❌ エラーが発生しました。";
                outputDiv.innerText = error.message;
                console.error(error);
            } finally {
                generateBtn.disabled = false;
            }
        });

        async function extractImagesFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const images = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                statusDiv.innerText = `⏳ PDFを高解像度画像に変換中 (${i} / ${pdf.numPages} ページ)...`;
                const page = await pdf.getPage(i);
                
                // 読取精度を劇的に上げるため、スケールを2.0に強化
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                const base64Data = dataUrl.split(',')[1];
                images.push(base64Data);
            }
            return images;
        }

        async function generateNotebook(apiKey, base64Images) {
            // プロンプトを極限まで具体化・高品質化
            const prompt = `添付された画像は、提供された技術資料・教科書のスキャンデータです。
これらの画像に書かれているすべての内容（文章、図、数式、グラフ、表など）を漏らさず正確に読み取り、試験対策や深い復習に耐えうる、極めて網羅的で質の高い「完璧な模範ノート」を作成してください。

【重要な約束事】
1. 情報の省略や要約による簡略化は絶対にしないでください。文章量が多くなっても構いません。元の資料にある概念、定理、公式の導出背景、具体例をすべて深く展開して記述してください。
2. 数式は非常に重要です。LaTeX形式（インラインは $...$、別行立ての数式ブロックは $$...$$）を「必ず」正しく使用して記述してください。
3. 数式内に登場するすべての記号やパラメータ（例: R_r、G、λ など）の意味も、漏れなく言葉で丁寧に解説してください。
4. 見出し、太字、箇条書き、必要に応じて比較表などを駆使して、構造的に整理された美しいノートにしてください。

【ノートの構成テンプレート】
# [タイトル]
## 1. 概要と背景（この章が扱うテーマの目的や全体像）
## 2. 重要キーワードと詳細な定義（用語の解説を深く細かく）
## 3. 理論・公式・数式の徹底解説（公式の形、導出、各パラメータの物理的な意味を詳細に。LaTeXを必ず使用）
## 4. プロセス・メカニズム（仕組みや手順の構造化された解説）
## 5. 要点のまとめ（特に覚えるべき重要ポイントの箇条書き）
## 6. 補足・応用・注意点（実務や試験でのひっかけ、関連事項）`;

            const parts = [{ text: prompt }];

            base64Images.forEach(base64 => {
                parts.push({
                    inlineData: {
                        mimeType: "image/jpeg",
                        data: base64
                    }
                });
            });

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{ parts: parts }]
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "Gemini APIとの通信に失敗しました。");
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(rawMarkdownOutput);
            alert('マークダウン形式のノートをクリップボードにコピーしました！他のノートアプリ（NotionやObsidianなど）にそのまま貼り付けられます。');
        });
    </script>
</body>
</html>
