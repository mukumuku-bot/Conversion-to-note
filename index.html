<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to 模範ノート生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">📝 PDF 模範ノート生成器</h1>
        
        <div class="mb-6 p-4 bg-gray-100 rounded-lg">
            <label class="block text-sm font-semibold mb-2" for="apiKey">Gemini API Key:</label>
            <input type="password" id="apiKey" class="w-full p-2 border border-gray-300 rounded mb-2" placeholder="AI Studioで取得したAPIキーを入力">
            <p class="text-xs text-gray-500">※キーはブラウザにのみ保存され、外部サーバーには送信されません。</p>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold mb-2">PDFファイルをアップロード:</label>
            <input type="file" id="pdfFile" accept="application/pdf" class="w-full p-2 border border-dashed border-blue-400 rounded bg-blue-50 text-center cursor-pointer">
        </div>

        <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition-all disabled:bg-gray-400" disabled>
            ノートを生成する
        </button>

        <div id="status" class="mt-4 text-center text-sm font-medium text-gray-600"></div>

        <hr class="my-8 border-gray-200">

        <div>
            <h2 class="text-xl font-bold mb-4 flex justify-between items-center">
                ✨ 生成された模範ノート
                <button id="copyBtn" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded hidden">コピー</button>
            </h2>
            <div id="output" class="p-6 bg-gray-900 text-green-400 font-mono rounded-lg overflow-auto max-h-96 whitespace-pre-wrap">
                ここに生成されたノートが表示されます...
            </div>
        </div>
    </div>

    <script>
        // PDF.js のワーカーを設定
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const apiKeyInput = document.getElementById('apiKey');
        const pdfFileInput = document.getElementById('pdfFile');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        // ローカルストレージからAPIキーを復元
        if (localStorage.getItem('gemini_api_key')) {
            apiKeyInput.value = localStorage.getItem('gemini_api_key');
        }

        // 入力チェックでボタンを有効化
        const checkInputs = () => {
            generateBtn.disabled = !(apiKeyInput.value && pdfFileInput.files.length > 0);
        };
        apiKeyInput.addEventListener('input', checkInputs);
        pdfFileInput.addEventListener('change', checkInputs);

        // メイン処理
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            const file = pdfFileInput.files[0];

            if (!apiKey || !file) return;

            // APIキーをローカルストレージに保存
            localStorage.setItem('gemini_api_key', apiKey);

            try {
                generateBtn.disabled = true;
                statusDiv.innerText = "⏳ PDFからテキストを抽出中...";
                outputDiv.innerText = "";
                copyBtn.classList.add('hidden');

                // 1. PDFからテキストを抽出
                const pdfText = await extractTextFromPDF(file);
                
                if (!pdfText.trim()) {
                    throw new Error("PDFからテキストを抽出できませんでした（スキャンされた画像形式の可能性があります）。");
                }

                statusDiv.innerText = "🤖 Gemini APIで模範ノートを生成中...";

                // 2. Gemini APIを叩く
                const notebookContent = await generateNotebook(apiKey, pdfText);

                // 3. 結果を表示
                outputDiv.innerText = notebookContent;
                statusDiv.innerText = "✅ 生成が完了しました！";
                copyBtn.classList.add('inline-block');
                copyBtn.classList.remove('hidden');

            } catch (error) {
                statusDiv.innerText = "❌ エラーが発生しました。";
                outputDiv.innerText = error.message;
            } finally {
                generateBtn.disabled = false;
            }
        });

        // PDFテキスト抽出ロジック
        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(" ");
                fullText += pageText + "\n";
            }
            return fullText;
        }

        // Gemini API 呼び出しロジック
        async function generateNotebook(apiKey, text) {
            // プロンプトの定義
            const prompt = `以下のテキストは、ある資料から抽出されたものです。この内容を、学生やエンジニアが後から見直して一目で理解できる「綺麗な模範ノート」としてまとめ直してください。
構成は、重要なキーワードの定義、要点の箇条書き、必要であれば構造的なまとめ（数式、プロセスなど）を含めて、マークダウン形式を意識して綺麗に整理してください。

【対象テキスト】
${text}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }]
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "APIリクエストに失敗しました。");
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        // コピーボタンの処理
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputDiv.innerText);
            alert('クリップボードにコピーしました！');
        });
    </script>
</body>
</html>
