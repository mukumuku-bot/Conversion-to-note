<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Study Notes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --sidebar-bg: #2e3440;
            --sidebar-text: #eceff4;
            --sidebar-active: #4c566a;
            --note-bg: #ffffff;
            --line-color: #e0dcd3;
            --text-color: #333333;
            --accent-color: #bf616a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* サイドバー */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid var(--sidebar-active);
            text-align: center;
        }

        .config-area {
            padding: 10px 15px;
            background-color: rgba(0,0,0,0.2);
            font-size: 0.8rem;
            border-bottom: 1px solid var(--sidebar-active);
        }

        .config-area input {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            background: #3b4252;
            border: 1px solid var(--sidebar-active);
            color: white;
            border-radius: 3px;
        }

        .note-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .note-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item:hover { background-color: rgba(255, 255, 255, 0.1); }
        .note-item.active {
            background-color: var(--sidebar-active);
            font-weight: bold;
            border-left: 4px solid var(--accent-color);
        }

        .actions {
            padding: 15px;
            border-top: 1px solid var(--sidebar-active);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
            text-align: center;
        }
        .btn-add { background-color: var(--sidebar-active); }
        .btn-upload { background-color: var(--accent-color); position: relative; }
        .btn:hover { opacity: 0.9; }
        .btn input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }

        /* メインコンテンツ */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .notebook {
            width: 100%;
            max-width: 800px;
            background-color: var(--note-bg);
            min-height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
            position: relative;
            padding: 60px 50px 40px 80px;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 2em;
            line-height: 2em;
        }

        .notebook::before {
            content: ''; position: absolute; top: 0; left: 65px; width: 2px; height: 100%;
            background-color: rgba(191, 97, 106, 0.4);
        }

        .notebook-holes {
            position: absolute; left: 20px; top: 40px; display: flex; flex-direction: column; gap: 30px;
        }
        .hole { width: 15px; height: 15px; background-color: var(--bg-color); border-radius: 50%; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }

        .note-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; line-height: 1.2; outline: none; }
        .note-body { font-size: 1.05rem; outline: none; white-space: pre-wrap; }

        [contenteditable]:empty:before { content: attr(data-placeholder); color: #aaa; font-style: italic; }

        /* ローディングアニメーション */
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); color: white; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; z-index: 1000; flex-direction: column; gap: 20px;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #fff; border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div id="loadingText">PDFを解析中...</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">AI PDF まとめノート</div>
        
        <div class="config-area">
            <label for="apiKey">🔑 Gemini API キー:</label>
            <input type="password" id="apiKey" placeholder="AIキーを入力（初回のみ）">
        </div>

        <ul class="note-list" id="noteList"></ul>
        
        <div class="actions">
            <button class="btn btn-upload">
                📂 PDFをアップロードしてノート化
                <input type="file" id="pdfInput" accept=".pdf">
            </button>
            <button class="btn btn-add" id="addNoteBtn">+ 空のノートを追加</button>
        </div>
    </div>

    <div class="main-content">
        <div class="notebook">
            <div class="notebook-holes">
                <div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div>
            </div>
            <div class="note-title" id="noteTitle" contenteditable="true" data-placeholder="タイトル..."></div>
            <div class="note-body" id="noteBody" contenteditable="true" data-placeholder="内容..."></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let notes = JSON.parse(localStorage.getItem('ai_pdf_notes')) || [];
        // 前回開いていたノートIDを復元、なければ最初のノート
        let currentNoteId = localStorage.getItem('current_note_id') || (notes.length > 0 ? notes[0].id : null);

        const noteListEl = document.getElementById('noteList');
        const noteTitleEl = document.getElementById('noteTitle');
        const noteBodyEl = document.getElementById('noteBody');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const pdfInput = document.getElementById('pdfInput');
        const apiKeyInput = document.getElementById('apiKey');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        apiKeyInput.value = localStorage.getItem('gemini_api_key') || '';
        apiKeyInput.addEventListener('input', () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value);
        });

        function renderSidebar() {
            noteListEl.innerHTML = '';
            notes.forEach(note => {
                const li = document.createElement('li');
                li.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                li.textContent = note.title || '無題のノート';
                li.addEventListener('click', () => selectNote(note.id));
                noteListEl.appendChild(li);
            });
        }

        function selectNote(id) {
            currentNoteId = id;
            // 開いているノートIDをブラウザに記憶（リロード対策）
            localStorage.setItem('current_note_id', id);
            
            const note = notes.find(n => n.id === id);
            if (note) {
                noteTitleEl.textContent = note.title;
                noteBodyEl.innerText = note.body;
            } else {
                noteTitleEl.textContent = '';
                noteBodyEl.innerText = '';
            }
            renderSidebar();
        }

        function saveNotes() {
            const currentNote = notes.find(n => n.id === currentNoteId);
            if (currentNote) {
                currentNote.title = noteTitleEl.textContent;
                currentNote.body = noteBodyEl.innerText;
                localStorage.setItem('ai_pdf_notes', JSON.stringify(notes));
                const activeItem = document.querySelector('.note-item.active');
                if (activeItem) activeItem.textContent = currentNote.title || '無題のノート';
            }
        }

        // 空のノートを追加
        addNoteBtn.addEventListener('click', () => {
            const newId = Date.now().toString();
            const nextNumber = notes.length + 1;
            
            notes.push({ id: newId, title: `📄 ${nextNumber}. 新しいノート`, body: "" });
            currentNoteId = newId;
            saveNotes();
            selectNote(newId);
        });

        noteTitleEl.addEventListener('input', saveNotes);
        noteBodyEl.addEventListener('input', saveNotes);

        // --- PDF処理 ＆ AI生成ロジック ---
        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('先にGemini APIキーを入力してください');
                pdfInput.value = '';
                return;
            }

            loadingOverlay.style.display = 'flex';
            loadingText.textContent = 'PDFからテキストを抽出中...';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let extractedText = '';
                
                const maxPages = Math.min(pdf.numPages, 20);
                for (let i = 1; i <= maxPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    extractedText += textContent.items.map(item => item.str).join(' ') + '\n';
                }

                loadingText.textContent = 'AIが模範ノートを作成中...';

                const prompt = `
                以下のテキストは、あるPDFファイルの内容です。
                学習者が後から見直しやすい「美しく整理された模範ノート」を作成してください。
                1行目はノートのタイトル、2行目以降に箇条書きなどで分かりやすく本文を書いてください。
                
                【テキスト】
                ${extractedText}
                `;

                // 【修正】最新の gemini-3-flash-preview に変更しました
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    const errorDetail = errorData.error?.message || `Status: ${response.status}`;
                    throw new Error(`Google側で拒否されました。\n【エラー詳細】: ${errorDetail}`);
                }

                const data = await response.json();
                const aiResult = data.candidates[0].content.parts[0].text;

                const lines = aiResult.split('\n');
                let title = lines[0].replace(/^[#*\s📊📄]+/g, '').trim();
                if (!title) title = file.name.replace('.pdf', '');
                const body = lines.slice(1).join('\n').trim();

                const newId = Date.now().toString();
                // タイトルに自動で「1. 2. 3...」と番号を振る
                const nextNumber = notes.length + 1;
                
                notes.push({ id: newId, title: `📝 ${nextNumber}. ${title}`, body: body });
                currentNoteId = newId;
                
                localStorage.setItem('ai_pdf_notes', JSON.stringify(notes));
                selectNote(newId);

            } catch (error) {
                alert('エラーが発生しました:\n' + error.message);
                console.error(error);
            } finally {
                loadingOverlay.style.display = 'none';
                pdfInput.value = '';
            }
        });

        // データの初期化（HTML更新時に内容を保持して最新化）
        if (notes.length > 0) {
            const exists = notes.some(n => n.id === currentNoteId);
            selectNote(exists ? currentNoteId : notes[0].id);
        } else {
            notes.push({
                id: "sample",
                title: "💡 1. 使い方ガイド",
                body: "1. 左上の「Gemini API キー」の欄にあなたのAPIキーを入力します。\n2. 下の「PDFをアップロードしてノート化」ボタンからPDFを選びます。"
            });
            currentNoteId = "sample";
            selectNote(currentNoteId);
        }
    </script>
</body>
</html>
